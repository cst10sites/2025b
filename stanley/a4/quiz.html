    <form>
      <label>
        <strong>
          What is the difference between the src and href attributes?
        </strong>
      </label>
      <br>
      <input id="option1" type="radio" value="fool" name="q1">
      <label>
        src is for retrieving source code from your computer, and href is for
        redirection.
      </label>
      <br>
      <input id="correct" type="radio" value="smart boy" name="q1">
      <label>
        src is for linking to files and href is for hyperlinks.
      </label>
      <br>
      <input id="option3" type="radio" value="buffoon" name="q1">
      <label>
        src can only be used in the &lt;head&gt; section of the document
      </label>
      <br>
      <input type="button" value="Submit" onclick="question1();">
      <input type="reset">
      <br>
    </form>
