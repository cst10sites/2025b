<input type="image" style="width:300px;" src="https://pngimg.com/d/cookie_PNG13683.png" alt=blahblahblah onclick="updateCPS();"> 

<p id="cpsDisplay"></p>

<hr>
 <a href="quiz.html" class="btn">HTML/CSS/JS Quiz</a>

<script>
// global variables
var nClicks = 0;
var startTime = new Date();

// basic version of Cookie Clicker code
function updateCPS() {
	if (nClicks == 0) {
		// first click
		startTime = new Date();
		nClicks += 1;
	}
	else {
		// subsequent clicks:
		var currentTime = new Date();
		var timeElapsed = (currentTime - startTime);
		// 3. calculate CPS = nClicks ÷ timeElapsed 
		var CPS = nClicks / (timeElapsed / 1000);
		var roundedCPS = CPS.toFixed(2);
		// 4. display CPS using id
		document.getElementById("cpsDisplay").innerHTML = roundedCPS;
		// 5. increase nClicks by 1
		nClicks += 1;
	}

}
</script>
