<body>
<h1>Cookie Clicker</h1>
<div class="cookie-button">
<button  onclick="updateCPS();">
  <img
    src="PerfectCookie.jpeg"
    alt="Cookie"
    style="width: 200px; height: 200px;"
  />
</button>
</div>
<p>Clicks per second:</p> <p id="cpsDisplay"></p>
<div class='reset'>
<a class='btn'button onclick='reset()'>Reset</a>
</div>
<p class='time'>Time</p>
<p id='timeDisplay' style='color: White;'></p>
<p class='time'>Total Clicks</p>
<p id='clickDisplay' style='color: White'>Clicks: 0</p>

<hr>
<h2>HTML/CSS/JS Quiz</h2>
<p>Click <a href="quiz.html">here</a> to play the quiz.</p>

<script>
// global variables
var nClicks = 0;
var startTime = new Date();

// basic version of Cookie Clicker code
function updateCPS() {
	if (nClicks == 0) {
		// first click
		startTime = new Date();
		nClicks += 1;
	}
	else {
		// subsequent clicks:
		var currentTime = new Date();
		var timeElapsed =(currentTime - startTime) / 1000; // in seconds
		document.getElementById('cpsDisplay').innerHTML = (nClicks  / timeElapsed).toFixed(2)
		nClicks +=1;

		// 3. calculate CPS = nClicks ÷ timeElapsed 
		//    BUT timeElapsed be measured in seconds (not milliseconds)
		// 4. display CPS using id
		// 5. increase nClicks by 1
	}

	//display clicks 
	  document.getElementById('clickDisplay').innerHTML = "Clicks: " + nClicks;




}

function reset(){
 location.reload();
  }

  setInterval(updateTime, 100);
//run updateTime() every 0.1 seconds (100 ms)

function updateTime() {
	if (nClicks > 0)
	var currentTime = new Date();
	var timePassed = (currentTime - startTime) / 1000;
	document.getElementById("timeDisplay").innerHTML = timePassed.toFixed(2);
}







</script>
