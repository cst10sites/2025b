<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" >
    <title>Assignment 4</title>
    <link rel="icon" type="image/webp" href="cartoon-cookie-icon-png.webp" >
    <link rel="stylesheet" type="text/css" href="style.css" >
    <!--create and edit style.css-->
    <style>

      h1  {
      	text-align: center;
      	text-decoration: underline;
      	color: mediumpurple;
      }

      h2 {
      	text-align: center;
      }

      body {
      	background-color: darkgrey;
      }


      h3, h4 {
      	text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>Cookie Clicker</h1>
    <div id="content">
      <h2>Click me!</h2>

      <input
        type="image"
        src="https://static.vecteezy.com/system/resources/previews/018/931/604/original/cartoon-cookie-icon-png.png"
        class="center"
        alt="Click cookie"
        onclick="updateCPS();"
        style="width: 350px; height: 300px;">

      <h3>CPS:</h3>
      <h4 id="cpsDisplay">. . .</h4>

      <hr>

      <a class="btn" href="quiz.html" target="_blank">HTML/CSS/JS Quiz</a>
    </div>

    <script>
      // global variables
      var nClicks = 0;
      var startTime = new Date();

      // basic version of Cookie Clicker code
      function updateCPS() {
      	if (nClicks == 0) {
      		// first click
      		// 1. reset startTime
      		// 2. increase nClicks by 1
      		startTime = new Date();
      		nClicks += 1;
      	}
      	else {
      		// subsequent clicks:
      		// 1. create variable currentTime
      		// 2. create variable timeElapsed and subtract start and currentTime
      		// 3. calculate CPS = nClicks ÷ timeElapsed
      		//    BUT timeElapsed be measured in seconds (not milliseconds)
      		// 4. display CPS using id
      		// 5. increase nClicks by 1
      		var currentTime = new Date();
      		var timeElapsed = (currentTime - startTime)
      		var CPS = nClicks / (timeElapsed / 1000)
      		var num = CPS;
      		var CPS = num.toFixed(1); // 3.1
      		document.getElementById("cpsDisplay").innerHTML = CPS;
      		nClicks += 1;


      	}

      }
    </script>
  </body>
</html>
