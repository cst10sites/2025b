  <h1>CHEESE QUIZ</h1>
  <div id="content">
    <form>
      <label>What country developped cheddar cheese?</label>
      <br>
      <br>
      <input id="Consortium" type="radio" value="en" name="ex2">
      <label>England</label>
      <br>
      <input id="Google" type="radio" value="fr" name="ex2">
      <label>Portugal</label>
      <br>
      <input id="Microsoft" type="radio" value="por" name="ex2">
      <label>France</label>
      <br>
      <input id="Mozilla" type="radio" value="fr" name="ex2">
      <label>USA</label>
      <br>
      <input type="button" value="Submit" onclick="example2();">
      <input type="reset">
      <br>
    </form>
    <br>
    <form>
      <label>Cheese is...</label>
      <select id="carValue">
        <option value="Volvo">that stuff on pizza</option>
        <option value="h1h1h1">enjoyed by people all over the world</option>
        <option value="Fiat">a product from animal milk</option>
        <option value="BMW">all of the above</option>
        <!-- id in select, value in option-->
      </select>
      <br>
      <input type="button" value="OK" onclick="example4();">
      <input type="reset">
      <br>
    </form>
    <p id="carDisplay">...</p>
    <br>
    <form>
      <label>What country did Parmigiano Reggiano originate in?</label>
      <br>
      <textarea id="w3review" name="w3review" rows="4" cols="50"></textarea>
      <br>
      <!--no input for textarea-->
      <input type="button" value="Submit" onclick="example1();">
      <input type="reset">
      <br>
      <!--This is a special type of button that resets all values in the form that it belongs to-->
    </form>
    <br>
    <form>
      <label>Which are stages in the process of making any cheese?</label>
      <br>
      <input id="choice1" type="checkbox" value="HTML">
      <label>Curds</label>
      <input id="choice2" type="checkbox" value="CSS">
      <label>Mold</label>
      <br>
      <input id="choice3" type="checkbox" value="Java">
      <label>Milk</label>
      <input id="choice4" type="checkbox" value="JavaScript">
      <label>Whey</label>
      <br>
      <input type="button" value="Submit" onclick="example3();">
      <input type="reset">
      <br>
    </form>
    <hr>

  <script>
    function example3() {
      var choice1 = document.getElementById("choice1").checked; // HTML
      var choice2 = document.getElementById("choice2").checked; // CSS
      var choice3 = document.getElementById("choice3").checked; // Java
      var choice4 = document.getElementById("choice4").checked; // JS
      // Note: All except for Java is correct
      var correct = (choice1 == true && choice2 == false && choice3 == true && choice4 == true);
      if (correct == true) {
        alert("Correct");
      } else {
        alert("Incorrect");
      }
    }

    function example2() {
      var correctAns = document.getElementById("Consortium").checked;
      // this answer will either be true or false
      if (correctAns == true) {
        alert("Correct!")
      } else {
        alert("Try again");
      }
    }

    function example1() {
      var answerTyped = document.getElementById("w3review").value;
      if (answerTyped == "Italy") {
        alert("Nice!");
      } else {
        alert("Incorrect!");
      }
    }

    function example4() {
      var choice = document.getElementById("carValue").value;
      // one of : fiat,volvo,bmw, saab
      choice = choice.toLowerCase();
      if (choice == "bmw") {
        document.getElementById("carDisplay").innerHTML = "Correct!"
      } else {
        document.getElementById("carDisplay").innerHTML = "That is not correct!";
      }
    }
  </script>
