<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<link rel="stylesheet" type="text/css" href="style.css">
	<title>Guide to the Planets | Planetarium</title>
</head>
<body>
	<div id="textPlace">
		<h1>The planetarium</h1>
		<p>
			Click on a planet to learn about it!
		</p>
		<a href="planetGame.html">Planet Game</a>
	</div>
	<div id="solarSystem">
		<div id="sun">
			<img src="images/sun.png" alt="The Sun" id="sunImage">
		</div>
		<div id="planetHolder">
			<div class="planet">
				<a href="planetinfo.html#mercury">
					<img src="images/mercury.png" alt="Mercury" class="planetImage">
				</a>
			</div>

			<div class="planet">
				<a href="planetinfo.html#venus">
					<img src="images/venus.png" alt="Venus" class="planetImage">
				</a>
			</div>

			<div class="planet">
				<a href="planetinfo.html#earth">
					<img src="images/earth.png" alt="Earth" class="planetImage">
				</a>
			</div>

			<div class="planet">
				<a href="planetinfo.html#mars">
					<img src="images/mars.png" alt="Mars" class="planetImage">
				</a>
			</div>

			<div class="planet gasGiant">
				<a href="planetinfo.html#jupiter">
					<img src="images/jupiter.png" alt="Jupiter" class="planetImage">
				</a>
			</div>

			<div class="planet gasGiant" style="width: 25%;">
				<a href="planetinfo.html#saturn">
					<img src="images/saturn.png" alt="Saturn" class="planetImage" style="width: 130%; transform: translateX(-20%);">
				</a>
			</div>

			<div class="planet gasGiant">
				<a href="planetinfo.html#uranus">
					<img src="images/uranus.png" alt="Uranus" class="planetImage">
				</a>
			</div>

			<div class="planet gasGiant">
				<a href="planetinfo.html#neptune">
					<img src="images/neptune.png" alt="Neptune" class="planetImage">
				</a>
			</div>

		</div>
	</div>
</body>
</html>
