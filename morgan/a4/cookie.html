<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Assignment 4</title>

<!--create and edit style.css-->

<body>
	<div class="centertext">
<h1>Cookie Clicker</h1>
<div id="cookieinfo">
<p>Click the cookie as fast as you can and see your clicks per second as well as your total cookies</p>
<p>To start, click on the gingerbread cookie!</p>
</div>
<h2 id="cpsDisplay">Clicks Per Second :</h2>
<h3 id="timeDisplay"></h3>
<input alt="cookie" type="image" src="cookieclick.png" style="width: 45%;" onclick="updateCPS();">
<h2 id="cookiesDisplay">Total Cookies :</h2>
<button onclick="reset();">Reset</button>

</div>

<hr>
<h2>HTML/CSS/JS Quiz</h2>
<p>Click this button to play the quiz:</p>
<a class="btn" href="quiz.html">Quiz!</a>

<script>

var nCookies = 0;


// global variables
var nClicks = 0;
var startTime = new Date();

// basic version of Cookie Clicker code
function updateCPS() {
	if (nClicks == 0) {
		nClicks = 1;
		startTime = new Date ();
		setInterval (updateTime, 100);
		document.getElementById("cookiesDisplay").innerHTML = "Total Cookies : 1"
		document.getElementById("cpsDisplay").innerHTML = "Clicks Per Second : 1";
	}
	else {
		nClicks += 1;
		var currentTime = new Date();
		var timePassed = (currentTime - startTime) / 1000;
		var cps = (nClicks / timePassed.toFixed(2));
		document.getElementById("cookiesDisplay").innerHTML = "total cookies : " + nClicks;
		document.getElementById("cpsDisplay").innerHTML = "Clicks Per Second : " + cps.toFixed(2);
	}
}

	function updateTime() {

	var currentTime = new Date();
		var timePassed = (currentTime - startTime) / 1000;
		var cps = (nClicks / timePassed.toFixed(2));
		document.getElementById("cookiesDisplay").innerHTML = "total cookies : " + nClicks;
	document.getElementById("cpsDisplay").innerHTML = "Clicks Per Second : " + cps.toFixed(2);
	document.getElementById("timeDisplay").innerHTML = timePassed.toFixed(2) + " seconds";
	}

	function reset() {
	location.reload();
}
//make reset button! + style

</script>
</body>
</html>
