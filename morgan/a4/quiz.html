    <script>

var answer3 = ol.toLowerCase() === "<ol></ol>";
var question3;

if (answer3) {

} else {

}

        if (answer1 && answer2 && answer3) {

//code from https://confetti.js.org/#
     
const defaults = {
  spread: 400,
  ticks: 100,
  gravity: 0,
  decay: 0.94,
  startVelocity: 30,
};

function shoot() {
  confetti({
    ...defaults,
    particleCount: 80,
    scalar: 3,
    shapes: ["circle", "square"],
    colors: ["#a864fd", "#29cdff", "#78ff44", "#ff718d", "#fdff6a"],
  });

  confetti({
    ...defaults,
    particleCount: 36,
    scalar: 5.5,
    shapes: ["emoji"],
    shapeOptions: {
      emoji: {
        value: ["🤩", "🎉"],
      },
    },
  });
}

function shootbad() {
  confetti({
    ...defaults,
    particleCount: 80,
    scalar: 3,
    shapes: ["circle", "square"],
    colors: ["#2091d2", "#1c1616", "#7e1313", "#1e2dab", "#713c3c"],
  });

  confetti({
    ...defaults,
    particleCount: 36,
    scalar: 5.5,
    shapes: ["emoji"],
    shapeOptions: {
      emoji: {
        value: ["😡", "😭"],
      },
    },
  });
}
