<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Clicker</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="icon" type="image/x-icon" href="cookie.ico">
</head>
<body>
    <h1>Cookie Clicker</h1>
    <div id="gameContainer">
        <input type="image" alt="cookie" src="cookie.png" id="startButtonDisplay">
        <p>Time spent: <span id="timeDisplay">0.00</span> seconds</p>
        <p>CPS: <span id="CPS">0.00</span></p>
        <p>Cookies: <span id="clicksDisplay">0</span></p>

        <button id="upgradeButton">Buy Upgrade (+1 cookie/click)</button>
        <p>Upgrade Cost: <span id="upgradeCost">10</span> cookies</p>

        <button id="cpsUpgradeButton">Buy Auto-Clicker (+0.1 CPS/sec)</button>
        <p>Auto-Clicker Cost: <span id="cpsUpgradeCost">50</span> cookies</p>

        <button id="resetButton" onclick="resetGame()">Reset</button>
    </div>
    <p>Click <a href="quiz.html">here</a> to take the quiz.</p>

    <script src="cookie_script.js"></script>



</body>
</html>
