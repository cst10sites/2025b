  <script>
    function radioq() {
      let correct = document.getElementById("option1");
      let wrong1 = document.getElementById("option2");
      let wrong2 = document.getElementById("option3");
      let wrong3 = document.getElementById("option4");

      let label1 = document.getElementById("label1");
      let label2 = document.getElementById("label2");
      let label3 = document.getElementById("label3");
      let label4 = document.getElementById("label4");

      label1.classList.remove("correct-answer", "incorrect-answer");
      label2.classList.remove("correct-answer", "incorrect-answer");
      label3.classList.remove("correct-answer", "incorrect-answer");
      label4.classList.remove("correct-answer", "incorrect-answer");

      if (correct.checked) {
        label1.classList.add("correct-answer");
      } else {
        label1.classList.add("correct-answer");
        if (wrong1.checked) label2.classList.add("incorrect-answer");
        if (wrong2.checked) label3.classList.add("incorrect-answer");
        if (wrong3.checked) label4.classList.add("incorrect-answer");
      }
    }
    function multiplec() {
    let correct = ['choice1', 'choice3', 'choice4'];
    for (let i = 1; i <= 5; i++) {
      let checkbox = document.getElementById('choice' + i);
      checkbox.classList.remove("correct-answer", "incorrect-answer");
      if (checkbox.checked) {
        if (correct.includes(checkbox.id)) {
          checkbox.classList.add("correct-answer");
        } else {
          checkbox.classList.add("incorrect-answer");
        }
      }
    }
  }

  }

  function no10() {
    markSingleCorrect('102', 101, 104);
  }

  function markSingleCorrect(correctId, startId, endId) {
    for (let i = startId; i <= endId; i++) {
      let radio = document.getElementById(i.toString());
      radio.classList.remove("correct-answer", "incorrect-answer");
      if (radio.checked) {
        if (radio.id === correctId) {
          radio.classList.add("correct-answer");
        } else {
          radio.classList.add("incorrect-answer");
        }
      }
    }
  }
